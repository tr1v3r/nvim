name: update lockfile
on:
  # Scheduled update (each day)
  schedule: [{ cron: "30 01 * * *" }]

jobs:
  update-lockfile:
    if: github.repository_owner == 'tr1v3r'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to count the commits
      - uses: andstor/file-existence-action@v2
        id: check_lockfile
        with:
          files: "lazy-lock.json"
      - name: Run count-new-commits
        run: |
          echo "NEW_COMMIT_COUNT=$(git log --oneline --since '24 hours ago' --perl-regexp --author='^((?!github-actions).*)$' | wc -l)" >> "$GITHUB_ENV"
      - uses: rhysd/action-setup-vim@v1
        if: ${{ steps.check_lockfile.outputs.files_exists == 'true' && env.NEW_COMMIT_COUNT > 0 }}
        with:
          neovim: true
          version: v0.12.4
      - name: Install tree-sitter CLI
        if: ${{ steps.check_lockfile.outputs.files_exists == 'true' && env.NEW_COMMIT_COUNT > 0 }}
        run: bash .github/scripts/install-tree-sitter.sh
      - name: Prepare Neovim configuration
        if: ${{ steps.check_lockfile.outputs.files_exists == 'true' && env.NEW_COMMIT_COUNT > 0 }}
        run: |
          mkdir -p "${HOME}/.config"
          ln -s "${GITHUB_WORKSPACE}" "${HOME}/.config/nvim"
          printf '%s\n' \
            'return {' \
            '  use_ssh = false,' \
            '  use_copilot = false,' \
            '  lsp_deps = {},' \
            '  treesitter_deps = {},' \
            '  null_ls_deps = {},' \
            '  dap_deps = {},' \
            '}' > _device.lua
      - name: Run lockfile-autoupdate
        if: ${{ steps.check_lockfile.outputs.files_exists == 'true' && env.NEW_COMMIT_COUNT > 0 }}
        timeout-minutes: 5
        run: nvim --headless "+Lazy! update" +qa
      - uses: stefanzweifel/git-auto-commit-action@v5
        if: ${{ steps.check_lockfile.outputs.files_exists == 'true' && env.NEW_COMMIT_COUNT > 0 }}
        with:
          commit_message: "chore(deps): auto update lazy-lock.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          file_pattern: "lazy-lock.json"
